/*
 * This Protofile describes the IBeam-Core Protocol.
 */
syntax = "proto3";
import "google/protobuf/descriptor.proto";
package ibeam_core;
option go_package = "../ibeam-core;ibeam_core";

// ibeam protocol version declaration
option (ibeam_version) = "v0.3.17";
extend google.protobuf.FileOptions { string ibeam_version = 5000; }

service IbeamCore {
  // Returns all basic information about the Core.
  rpc GetCoreInfo(Empty) returns (CoreInfo);

  // Returns all information about the Device of the given DeviceID.
  // If you specify no ID, you get the DeviceInfos of all Devices.
  rpc GetDeviceInfo(DeviceIDs) returns (DeviceInfos);

  // Returns all information about the Model of the given ModelID.
  // If you specify no ID, you get the ModelInfos of all Models.
  rpc GetModelInfo(ModelIDs) returns (ModelInfos);

  // Returns all Parameters with the specified DeviceParameterIDs.
  // Each Parameter includes the actual ParameterValue, which gives information
  // about the availability and shows if the Parameter is assumed.
  // If you set no ParameterID, you get all Parameters for a given Device.
  rpc Get(DeviceParameterIDs) returns (Parameters);

  // Returns all ParameterDetails of the given ModelParameterID.
  // The Details include all basic information about a Parameter,
  // describing how you can control it.
  // If you set no ParameterID, you get all Parameters for a given Model.
  rpc GetParameterDetails(ModelParameterIDs) returns (ParameterDetails);

  // Sets the value of one or more Parameters.
  // This call returns no error — errors are reported via the Subscribe stream.
  rpc Set(Parameters) returns (Empty);

  // Subscribes to Parameter updates. If no ID is specified, subscribes to all Parameters.
  // All current values are sent back immediately on subscribe.
  rpc Subscribe(DeviceParameterIDs) returns (stream Parameter);

  // Config Handling

  // Returns the current core configuration.
  rpc GetCoreConfig(Empty) returns (ByteData);

  // Returns the generated JSON schema for the core configuration.
  rpc GetCoreConfigSchema(Empty) returns (ByteData);

  // Sets the core configuration and writes it to the config file.
  rpc SetCoreConfig(ByteData) returns (Empty);

  // Restarts the core. Only works on Unix-based systems.
  rpc RestartCore(RestartInfo) returns (Empty);

  // Returns images for the requested models.
  rpc GetModelImages(ModelImageRequest) returns (ModelImages);
}

// The Empty message type for services that need or return no data
message Empty {}

/* * * * * * * * * * * * * *
        CORE
 * * * * * * * * * * * * * */

// CoreInfo contains the basic information about the IBeamCore.
message CoreInfo {
  // Version of the IBeam Protocol
  string ibeamVersion = 1;
  // Version of the IBeam Core
  string coreVersion = 2;
  // Field for describing the Core
  string description = 3;
  // Name of the Core in the format core-...
  string name = 4;
  // Friendly name of the core for display everywhere
  string label = 11;
  // Number of Devices, that can be handled by the core
  uint32 maxDevices = 5;
  // Number of currently connected clients on the Core
  uint32 connectedClients = 6;
  // Type of connection. See ConnectionType enum
  ConnectionType connectionType = 7;
  // Primary category of the devices this core can control, used as metadata in
  // listings
  DeviceCategory deviceCategory = 8;
  // Additional categories for the core
  repeated DeviceCategory additionalDeviceCategorys = 12;
  // Flag set by the system to indicate the presence of Model Images
  bool hasModelImages = 9;
  // Used to indicate information about the development status of a core
  string developmentStatus = 10;
  // String indicating licensing information
  string licenseInformation = 13;

  // Indicates the core supports sending a configuration save command
  bool canTriggerConfigSave = 14;
  
  // Indicates the core supports reloading the config without a full restart
  bool canReloadConfig = 15;

  // Indicates the core supports simulated devices when the device ip == "simulated"
  bool supportsNativeSimulation = 16;
}

// The ConnectionType describes how the Core connects to the device
enum ConnectionType {
  Other = 0;
  Network = 1;
  Serial = 2;
  Sdi = 3;
  Bluetooth = 4;
}

// The DeviceCategory describes what type of device this core is connecting to
enum DeviceCategory {
  Undefined = 0;
  PTZCamera = 1;
  ClassicCamera = 2;
  VideoSwitcher = 3;
  VideoRouter = 4;
  AudioDevice = 5;
  LightDevice = 6;
  VideoProcessing = 7;
  MotionSystem = 8;
  TallySystem = 9;
  GenericProtocol = 10;
}

message ByteData { bytes data = 1; }

message RestartInfo {
  bool ReloadOnly = 1; // Indicate that this should only be a reload, not a full restart
}

message ModelImageRequest {
  // ModelIDs to get images for
  ModelIDs models = 1;
  // When true, server must omit image data and return only MD5 hashes.
  bool HashOnly = 2;
}

enum DiscoveryType {
  NoDiscovery = 0;
  // Discover via mDNS (default).
  MDNS = 1;
  // Discover via UPnP SSDP.
  SSDP = 2;
  PANASONIC_UDP_BROADCAST = 3;
  VISCA = 4;
  SLP = 5;
  CUSTOM = 6; //reserved for new tricks
}

message DiscoveryMethod {
  DiscoveryType DiscoverType = 1; 
  // Overrides the port requested from the device with a different one.
  int32 PortOverride = 2; 
// Overrides the device name; defaults to the discovered hostname.
  string NameOverride = 6;

  // Provide the realm of discovery, for mdns this is the search scope
  string Realm = 3;
  // Provide a regex match for the text record of the MDNS discovery. If
  // hostname AND text are set both need to be true to match
  string TextRegex = 4;
  // provide a regex match for the hostname. If hostname AND text are set both
  // need to be true to match
  string HostnameRegex = 5;

  // Provide a regex of either the location or the Server header. If it matches
  // discovery will fetch more info and evaluate the response using
  // XMLDeviceRegex
  string SSDPServerRegex = 7;
  // See SSDPServerRegex
  string SSDPLocationRegex = 8;
  
  // Additional Info, mostly used on custom discovery types, or NDI
  string AdditionalDiscoveryInfo = 10;
  
  map<string, string> XMLDeviceRegex = 9;
}

// Images are guaranteed to be returned in the same order as the request.
message ModelImages {
  repeated ModelImage imgs = 1;
}

message ModelImage {
  // ID of the model
  uint32 ModelID = 1;
  // actual image data, might be missing in case HashOnly is set to true in the
  // request
  bytes ImageData = 2;
  // MD5 Hash of the image
  string Hash = 3;
}

/* * * * * * * * * * * * * *
        DEVICE
 * * * * * * * * * * * * * */

message DeviceIDs { repeated uint32 ids = 1; }

// DeviceInfo is kept simple; connection status and device config are handled
// via parameters.
message DeviceInfo {
  uint32 deviceID = 1;
  uint32 modelID = 2;
}

message DeviceInfos { repeated DeviceInfo deviceInfos = 1; }

/* * * * * * * * * * * * * *
        MODEL
 * * * * * * * * * * * * * */

message ModelIDs { repeated uint32 ids = 1; }

// ModelInfo describes a model of the IBeamCore. It is used to describe
// different sets of Parameters for different models.
message ModelInfo {
  // ID of the model
  uint32 id = 1;
  // Name of the model
  string name = 2;
  // Description of the model
  string description = 3;

  // Describe how this model can be auto-discovered on a network
  DiscoveryMethod discovery = 4;

  // Used to indicate information about the development status of a model, uses
  // the same classes as for core-info
  string developmentStatus = 5;
  
  // When set, will never show "Connected/Unconnected" but rather "Ready" in Reactor.
  // The core should still set the connection status of the devices to true.
  bool optimisticConnectionStatus = 6;

  repeated DeviceCategory deviceCategorys = 12;
  // Link template to the device's web UI. Use {ip} for the IP address,
  // {port} or {:port} for an optional port (with or without a leading colon).
  // When defined, a button to open the UI will be rendered.
  string DeviceWebUILink = 13;
  // String indicating licensing information
  string licenseInformation = 14;
}
message ModelInfos { repeated ModelInfo modelInfos = 1; }

/* * * * * * * * * * * * * *
        PARAMETER
 * * * * * * * * * * * * * */

message DeviceParameterID {
  uint32 parameter = 1;
  uint32 device = 2;
}

message DeviceParameterIDs { repeated DeviceParameterID ids = 1; }

message Parameter {
  DeviceParameterID id = 1;
  ParameterError error = 2;
  repeated ParameterValue value = 3;
}
message Parameters { repeated Parameter parameters = 1; }

message ParameterValue {
  repeated uint32 dimensionID = 1;
  // Shows if the Parameter is currently available. This field is ignored in set
  // request
  bool available = 2;
  // Shows if the Parameter is currently assumed. This field is ignored in set
  // request.
  bool isAssumedState = 3;

  // This boolean should be set by the server if the value is either not yet
  // known, or known to be invalid from the implementation. It signals to
  // the client to replace the value with a placeholder.
  bool invalid = 21;
  // The Value for the Parameter.
  oneof value {
    int32 integer = 4;
    int32 incDecSteps = 5; // Increment or decrement step value (positive or negative)
    double floating = 6;
    string str = 7;
    uint32 currentOption = 8;
    Command cmd = 9;
    bool binary = 10;
    OptionList optionListUpdate = 11;  // Used to update an optionlist
    double minimumUpdate = 12;         // used to update a minimum value
    double maximumUpdate = 13;         // used to update a maximum value
    ParameterValue defaultUpdate = 18; // used to update a default value
    bytes png = 14;
    bytes jpeg = 15;
    CustomError error = 16;
    SystemMessage system = 19;
  }

  map<string, ParameterMetaValue> metaValues = 20;
}

message CustomError {
  // Unique identifier for this error type, allowing recipients to detect
  // repeating errors and deduplicate or merge them.
  string ID = 1;
  string Message = 2;
  CustomErrorType errortype = 3;
}

message SystemMessage {
  SystemMessageType messagetype = 1;
}

enum CustomErrorType {
  Error = 0;
  Resolve = 1;
  Warning = 2;
}

enum SystemMessageType {
  None = 0;
  SaveDeviceConfiguration = 1;
}

message OptionList { repeated ParameterOption options = 1; }

message ModelParameterID {
  uint32 parameter = 1;
  uint32 model = 2; // If unspecified, the default model with ID 1 should be returned by the server.
}
message ModelParameterIDs { repeated ModelParameterID ids = 1; }

message ParameterDetail {
  // Parameter IDs should be unique (per model) and will break compatibility if
  // changed between versions
  ModelParameterID id = 1;

  // Code-safe name of the parameter.
  string name = 2;

  // Path describes a grouping of the parameter to the client. Groups must be
  // separated by a / and can contain spaces. Must end with a / and must not
  // contain the parameter name or label.
  string path = 24;

  // Gives parameters multiple dimension values, e.g. for channels of a frame
  // synchroniser or MEs / Keys in a switcher.
  repeated DimensionDetail dimensions = 3;

  // The parameter label for the client
  string label = 4;
  string shortLabel = 5;
  string description = 6;

  // Marks the parameter as experimental. The description should provide more details.
  bool IsExperimental = 37;

  GenericType genericType = 7;

  // Specifies if this parameter can be controlled via a centering analog control
  // such as a joystick.
  bool isSpeedValue = 8;

  ControlStyle controlStyle = 9;
  FeedbackStyle feedbackStyle = 10;

  // time to wait between sending commands to the device
  uint32 controlDelayMs = 11;

  // time to wait after a set before sending new values to the client subscribe
  // stream
  uint32 quarantineDelayMs = 12;

  // how often to retry a set if target != current config value for Normal
  // Control Style
  uint32 retryCount = 13;

  // The actual type of the value
  ValueType valueType = 14;

  string displayPrefix = 27;
  string displaySuffix = 28;
  FloatPrecision displayFloatPrecision = 29;

  // Input curve allows the core to specify what style of input value range
  // function is appropriate for this parameter; e.g. focus or audio may need
  // logarithmic style curves.

  reserved 30; // reserved for legacy reasons (InputCurve)
  // Exponent for the input curve. Values of 0, 0.5, 1, or any value <= 0 or >= 1
  // are invalid and will disable the feature. This adds a curve to the input
  // sliders, similar to a "logarithmic potentiometer" — useful for audio or
  // focus parameters. See: https://electronics.stackexchange.com/questions/304692/formula-for-logarithmic-audio-taper-pot
  float inputCurveExpo = 34;

  // Value threshold for when the manager marks the parameter as set correctly.
  // Useful for cases where the device responds with a slightly different value
  // than requested.
  double acceptanceThreshold = 35;

  // Extended value info provides a way of adding further values to a integer or
  // float value type it also allows to specify labels for certain values like
  // "Close", "Far", "Near". Do NOT use this for indicating unavailable or
  // invalid values! use the corresponding flags instead
  repeated DescreteValueDetail descreteValueDetails = 31;

  // Minimum value for Integer and Float parameters.
  double minimum = 16;
  // Maximum value for Integer and Float parameters.
  double maximum = 17;

  // Fine step value recommended by the devicecore for Integer and Float parameters.
  double fineSteps = 32;
  // Coarse step value recommended by the devicecore for Integer and Float parameters.
  double coarseSteps = 33;

  // Option List including the starting options
  OptionList optionList = 18;

  // This is set to true when the optionlist can update during runtime
  bool optionListIsDynamic = 19;
  // This is set to true when the minimum and maximum can update during runtime.
  bool minMaxIsDynamic = 26;

  // This is set to true when the default can update during runtime
  bool defaultIsDynamic = 42;

  // Default value for a parameter
  ParameterValue defaultValue = 20;

  // Map with Parameter meta values, added values that might need to be used for
  // any additional info that does not require the devicecore to hold more state
  map<string, ParameterMetaDetail> metaDetails = 21;
  // Maximum Value for Incrementation
  int32 incDecStepsUpperLimit = 22;
  // Maximum Negative Value for Decrementation
  int32 incDecStepsLowerLimit = 23;

  // Specifies if a parameter can still be controlled while the connection state is
  // false. Only takes effect if a connection state parameter exists in the devicecore.
  bool controllableWhileDisconnected = 25;

  // Hints to the client what user level this parameter covers (purely metadata).
  ParameterUIType UIType = 38;

  // Hints to the client that this parameter should be paired with another for display.
  string RecommendedParamForTextDisplay = 39;
  string RecommendedParamForTitleDisplay = 41;

  // Support specifying a recommended color scheme for this parameter, eg "red/green" or "red/white" (follows "active/inactive" pattern)
  string RecommendedColorSchema = 43;

  int32 UIListingOrder = 40;
}

message ParameterDetails { repeated ParameterDetail details = 1; }

message DimensionDetail {
  string name = 1;
  uint32 count = 2;
  string description = 3;
  // Optional labels for individual dimension elements. Caution: this is not
  // intended for parameters like RGB or combinations of different values.
  // Use it to label discrete entries such as audio channels (e.g. channel 9 and
  // 10 referred to as MasterLeft / MasterRight). Only use it when the label
  // improves clarity beyond what the index alone conveys.
  map<uint32, string> elementLabels = 4;
}

message ParameterMetaValue {
  oneof value {
    int32 integer = 1;
    bool binary = 2;
    string str = 3;
    double floating = 4;
  }
}

enum ParameterMetaType {
  MetaInteger = 0;
  MetaBinary = 1;
  MetaStr = 2;
  MetaFloating = 3;
  MetaOption = 4;
}

message ParameterMetaDetail {
  ParameterMetaType metaType = 1;
  double Minimum = 2;
  double Maximum = 3;
  repeated string options = 4;

  bool required = 5;
  string description = 6;
}

message ParameterOption {
  uint32 id = 1;
  string name = 2;
  string shortName = 3;
}

message DescreteValueDetail {
  // The actual value that is supposed to be replaced
  double value = 1;

  // The actual label for this value or valuerange
  string name = 2;
}

enum Command {
  Trigger = 0;
}

enum ValueType {
  NoValue = 0;
  Integer = 1;
  Floating = 2;
  Opt = 3;
  String = 4;
  Binary = 5;
  PNG = 6;
  JPEG = 7;
}

enum FeedbackStyle {
  UndefinedFeedbackStyle = 0;
  NormalFeedback = 1;
  DelayedFeedback = 2;
  NoFeedback = 3;
}

enum ControlStyle {
  UndefinedControlStyle = 0;
  // Normal control, by setting a Value
  Normal = 1;
  // Use Increment and Decrement by sending positive or negative values.
  Incremental = 2;
  // Accept no control, display only
  NoControl = 3;
  // Accept only Command::Trigger
  Oneshot = 4;

  reserved 5; // reserved for legacy, removed controlled incremental here
}

enum FloatPrecision {
  UndefinedFloatPrecision = 0;
  OneDecimal = 1;
  TwoDecimals = 2;
  ThreeDecimals = 3;
  FourDecimals = 4;
}

// Well-known generic types for common parameters.
enum GenericType {
  Generic = 0;
  ConnectionState = 1;
  DeviceIP = 2;
  Pan = 3;  // When combined with Zoom, invert conditions are applied.
  Tilt = 4; // When combined with Zoom, invert conditions are applied.

  Focus = 11; // When combined with Zoom, invert conditions are applied.
  Zoom = 12;  // When combined with Pan/Tilt/Focus, invert conditions are applied.

  Tally = 5;
  Record = 6;
  Iris = 7;

  TestTrigger = 8;

  SettableValue = 9; // Alternative label style: set a value first, then apply a step change.
  SimpleConfirm = 10;

  PresetRecall = 13;
  PresetStore = 14;
  PresetExist = 15;
  PresetDelete = 16;

  PresetThumbnail = 17;
  PresetThumbnailExists = 18;

  Routing = 19;
  RoutingOutputLabel = 20;
  RoutingInputLabel = 21;

  VUMeter = 22;
}

// Error types returned when setting a Parameter.
enum ParameterError {
  NoError = 0;
  UnknownError = 1;
  UnknownID = 2;
  MinViolation = 3;
  MaxViolation = 4;
  InvalidType = 5;
  MaxRetrys = 6;
  StepSizeViolation = 7;
  // Will be returned if Value for Parameter with NoValue was set
  HasNoValue = 8;
  Unavailable = 9;
  Custom = 10; // Indicates the message contains a custom error payload.
}

enum ParameterUIType {
  NormalParameter = 0; // Always selectable in the parameter dropdown.
  SimpleParameter = 1; // Also exposed as an auto-generated one-click behavior.
  HelperParameter = 2; // Hidden in the parameter dropdown unless "all parameters" is enabled.
}
